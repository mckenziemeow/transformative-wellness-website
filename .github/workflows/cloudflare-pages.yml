# Deploy static site root (.) to Cloudflare Pages — no build step.
#
# Required GitHub repo secret:
#   CLOUDFLARE_API_TOKEN — API Token with "Cloudflare Pages → Edit" (template: Edit Cloudflare Pages)
# Optional (overrides wrangler.toml if set):
#   CLOUDFLARE_ACCOUNT_ID — 32-char hex; if omitted, wrangler uses account_id in wrangler.toml
#
# One-time (if project missing): npx wrangler pages project create transformative-wellness --production-branch=main
#
# Production URL: https://transformative-wellness.pages.dev/
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cloudflare API token
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set. Add it under Repo Settings → Secrets → Actions."
            echo "::error::Create a token at dash.cloudflare.com → My Profile → API Tokens → Edit Cloudflare Pages."
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN is set."

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Empty secret would override wrangler.toml — unset so Pages uses account_id from wrangler.toml
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            unset CLOUDFLARE_ACCOUNT_ID
            echo "Using account_id from wrangler.toml (set CLOUDFLARE_ACCOUNT_ID secret to override)."
          fi
          npx --yes wrangler@3 pages deploy . --project-name=transformative-wellness
